<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buenos Aires Living</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --surface2: #EDECEA;
    --border: #DDDBD6;
    --text: #16181F;
    --text2: #5A5D6B;
    --text3: #9799A6;
    --accent: #1B3A5C;
    --accent-light: #E6EDF4;
    --accent-text: #0F2238;
    --danger: #B83232;
    --danger-light: #FDECEA;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }

  /* NAV */
  .topnav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 50; }
  .logo { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; text-decoration: none; }
  .logo-brand { font-family: 'DM Serif Display', serif; font-size: 17px; font-style: normal; color: var(--accent); letter-spacing: -0.2px; line-height: 1.1; }
  .logo-divider { display: none; }
  .logo-sub { font-family: 'DM Serif Display', serif; font-size: 12px; font-style: italic; color: var(--text3); letter-spacing: -0.1px; line-height: 1; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .tab-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .tab-btn { padding: 6px 16px; border: none; background: transparent; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .lang-group { display: flex; gap: 3px; }
  .lang-btn { padding: 5px 9px; border: 1px solid var(--border); background: transparent; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
  .lang-btn:hover { color: var(--text); border-color: var(--text3); }
  .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* LAYOUT */
  .view { display: none; }
  .view.active { display: block; }
  .container { max-width: 1080px; margin: 0 auto; padding: 2rem; }

  /* COMMON */
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.75rem; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); line-height: 1.2; }
  .page-title small { display: block; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text3); font-weight: 400; margin-top: 2px; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
  .btn:hover { background: var(--surface2); border-color: var(--text3); }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-text); border-color: var(--accent-text); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text2); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .btn-danger-ghost { background: transparent; border-color: transparent; color: var(--text3); padding: 6px 10px; }
  .btn-danger-ghost:hover { background: var(--danger-light); color: var(--danger); border-color: transparent; }
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text3); grid-column: 1 / -1; }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 15px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; margin-bottom: 1.25rem; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }
  .back-link svg { width: 14px; height: 14px; }

  /* CLIENTS */
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
  .client-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .client-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent-light); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .client-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .client-budget { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .client-footer { display: flex; align-items: center; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); background: var(--surface2); padding: 3px 9px; border-radius: 20px; }
  .stat-chip svg { width: 12px; height: 12px; }
  .stat-chip.liked { color: var(--danger); background: var(--danger-light); }

  /* DETAIL */
  .detail-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 1.25rem; box-shadow: var(--shadow); }
  .avatar-lg { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-light); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
  .detail-info { flex: 1; }
  .detail-name { font-size: 18px; font-weight: 600; margin-bottom: 3px; }
  .detail-budget { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .link-row { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; width: fit-content; max-width: 100%; }
  .link-text { font-size: 12px; color: var(--text2); font-family: monospace; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 320px; }

  /* ADD PROPERTY */
  .add-section { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
  .add-section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .add-section-title svg { width: 14px; height: 14px; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type="text"], input[type="date"], input[type="time"], textarea, select { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; transition: border-color 0.15s; outline: none; }
  input[type="text"]:focus, input[type="date"]:focus, input[type="time"]:focus, textarea:focus, select:focus { border-color: var(--accent); background: var(--surface); }
  .input-url { flex: 1; min-width: 200px; }
  .input-price { width: 130px; }
  .input-addr { width: 180px; }
  .input-rooms { width: 80px; }
  .input-m2 { width: 80px; }
  .input-floor { flex: 1; min-width: 140px; }

  /* PROPS */
  .props-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .prop-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: all 0.2s; display: flex; flex-direction: column; }
  .prop-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .prop-thumb { height: 170px; background: linear-gradient(135deg, var(--surface2) 0%, var(--bg) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .prop-thumb-icon { opacity: 0.18; }
  .prop-thumb-icon svg { width: 64px; height: 64px; }
  .prop-source-badge { position: absolute; bottom: 10px; left: 10px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.3px; }
  .badge-zonaprop { background: #E8F4FD; color: #0066CC; }
  .badge-ml { background: #FFF9E6; color: #B8860B; }
  .fav-btn { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .fav-btn:hover { border-color: var(--danger); }
  .fav-btn svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; transition: all 0.15s; }
  .fav-btn.liked svg { stroke: var(--danger); fill: var(--danger); }
  .prop-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .prop-price { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
  .prop-addr { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .prop-addr svg { width: 13px; height: 13px; flex-shrink: 0; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); display: flex; align-items: center; gap: 4px; }
  .chip svg { width: 11px; height: 11px; }
  .prop-actions { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .prop-comment { width: 100%; resize: none; min-height: 68px; font-size: 13px; padding: 8px 10px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; margin-top: 4px; }
  .prop-comment:focus { border-color: var(--accent); background: var(--surface); outline: none; }
  .saved-msg { font-size: 12px; color: var(--accent); display: none; align-items: center; gap: 4px; margin-top: 3px; }
  .saved-msg svg { width: 13px; height: 13px; }

  /* CLIENT VIEW */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .filter-pills { display: flex; gap: 6px; }
  .pill { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .pill:hover { border-color: var(--text3); color: var(--text); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill svg { width: 13px; height: 13px; }
  .client-hero { background: var(--accent); border-radius: var(--radius); padding: 2rem 2.5rem; margin-bottom: 1.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .client-hero-left h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: #fff; line-height: 1.2; margin-bottom: 6px; }
  .client-hero-left p { font-size: 14px; color: rgba(255,255,255,0.7); }
  .client-hero-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius-sm); padding: 10px 18px; text-align: center; flex-shrink: 0; }
  .client-hero-badge .num { font-family: 'DM Serif Display', serif; font-size: 28px; color: #fff; line-height: 1; }
  .client-hero-badge .lbl { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 3px; }
  .autosave-note { display: flex; align-items: center; gap: 8px; background: var(--accent-light); border: 1px solid #B8CCE0; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; color: var(--accent-text); margin-bottom: 1.25rem; }
  .autosave-note svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(22,24,31,0.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 2rem; width: 460px; max-width: 95vw; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 1.25rem; }
  .form-field { margin-bottom: 1rem; }
  .form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .form-field input, .form-field select { width: 100%; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* ---- VISITS ---- */
  .visits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .v-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .v-panel-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .v-panel-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .v-panel-title svg { width: 16px; height: 16px; color: var(--text2); }
  .v-panel-body { padding: 16px 18px; }
  .cal-nav { display: flex; align-items: center; gap: 6px; }
  .cal-nav button { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 8px; cursor: pointer; color: var(--text2); display: flex; align-items: center; transition: background 0.12s; }
  .cal-nav button:hover { background: var(--surface2); }
  .cal-nav button svg { width: 14px; height: 14px; }
  .cal-month-lbl { font-size: 13px; font-weight: 600; color: var(--text); min-width: 110px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-top: 4px; }
  .cal-dow { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 600; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); cursor: pointer; position: relative; transition: background 0.12s; }
  .cal-day:hover { background: var(--surface2); }
  .cal-day.other { color: var(--text3); }
  .cal-day.today { font-weight: 600; color: var(--text); }
  .cal-day.has-visit::after { content:''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-day.selected { background: var(--accent); color: #fff; font-weight: 600; }
  .cal-day.selected::after { background: rgba(255,255,255,0.7); }
  .visit-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .visit-item { padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.12s; display: flex; align-items: flex-start; gap: 10px; background: var(--surface); }
  .visit-item:hover { border-color: var(--accent); }
  .visit-item.active { border-color: var(--accent); background: var(--accent-light); }
  .visit-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .visit-info { flex: 1; min-width: 0; }
  .visit-time { font-size: 11px; color: var(--text2); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
  .visit-time svg { width: 11px; height: 11px; }
  .visit-addr { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .visit-client { font-size: 11px; color: var(--text2); }
  .visit-link { font-size: 11px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 3px; margin-top: 3px; }
  .visit-link:hover { text-decoration: underline; }
  .visit-link svg { width: 10px; height: 10px; }
  .map-wrap { width: 100%; height: 290px; background: var(--surface2); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border); }
  .map-wrap svg { width: 100%; height: 100%; }
  .route-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .route-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }
  .route-chip svg { width: 13px; height: 13px; }
  .add-visit-btn { width: 100%; padding: 9px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border); background: transparent; color: var(--text2); font-size: 13px; font-family: 'DM Sans',sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; transition: all 0.12s; }
  .add-visit-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text3); }
  .add-visit-btn svg { width: 14px; height: 14px; }
  .add-visit-form { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; margin-top: 10px; display: none; flex-direction: column; gap: 8px; border: 1px solid var(--border); }
  .add-visit-form.open { display: flex; }
  .form-row { display: flex; gap: 8px; }
  .form-row input, .form-row select { flex: 1; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .form-actions button { padding: 7px 16px; border-radius: var(--radius-sm); font-family: 'DM Sans',sans-serif; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.12s; }
  .form-actions .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .form-actions .save-btn:hover { background: var(--accent-text); }
  .empty-day { text-align: center; padding: 20px; color: var(--text3); font-size: 13px; }
  .empty-day svg { width: 32px; height: 32px; margin-bottom: 8px; opacity: 0.4; display: block; margin-left: auto; margin-right: auto; }

  @media (max-width: 900px) { .visits-grid { grid-template-columns: 1fr; } }
  @media (max-width: 640px) {
    .topnav { padding: 0 1rem; gap: 6px; }
    .tab-btn { padding: 6px 10px; font-size: 12px; }
    .container { padding: 1rem; }
    .client-hero { flex-direction: column; padding: 1.5rem; }
    .detail-hero { flex-direction: column; }
    .input-row { flex-direction: column; }
    .input-url, .input-price, .input-addr, .input-rooms, .input-m2, .input-floor { width: 100%; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">
    <span class="logo-brand">Buenos Aires Living</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Mi Catálogo</span>
  </div>
  <div class="nav-right">
    <div class="tab-toggle">
      <button class="tab-btn active" id="tab-agent" onclick="switchTab('agent')"></button>
      <button class="tab-btn" id="tab-visits" onclick="switchTab('visits')"></button>
      <button class="tab-btn" id="tab-client" onclick="switchTab('client')"></button>
    </div>
    <div class="lang-group">
      <button class="lang-btn" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ru')">RU</button>
    </div>
  </div>
</nav>

<!-- AGENT VIEW -->
<div class="view active" id="view-agent">
  <div class="container">
    <div id="clients-list-view">
      <div class="page-header">
        <div class="page-title" id="lbl-my-clients-title">Mis clientes<small id="lbl-clients-sub"></small></div>
        <button class="btn btn-primary" onclick="openNewClient()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="lbl-new-client">Nuevo cliente</span>
        </button>
      </div>
      <div class="clients-grid" id="clients-grid"></div>
    </div>

    <div id="client-detail-view" style="display:none">
      <div class="back-link" onclick="showClientsList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="lbl-all-clients">Todos los clientes</span>
      </div>
      <div class="detail-hero">
        <div class="avatar-lg" id="detail-avatar"></div>
        <div class="detail-info">
          <div class="detail-name" id="detail-name"></div>

const API_URL = 'https://script.google.com/macros/s/AKfycbyCvM0dNkVOfwMQVEXatJXd-qnbyZOAG0olUqSLJ2SGKQiaEyMymepEtOMe_D_YBNZi/exec';

let lang = 'es';
let state = { clients: [], currentClient: null, filter: 'all' };
let visits = [];

/* ---- API ---- */
async function api(action, data={}) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...data })
    });
    return await res.json();
  } catch(e) {
    console.error('API error', e);
    return { error: e.toString() };
  }
}

function showSpinner(show) {
  let el = document.getElementById('global-spinner');
  if(!el) {
    el = document.createElement('div');
    el.id = 'global-spinner';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:999;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.style.opacity = show ? '1' : '0';
}

async function loadClients() {
  showSpinner(true);
  const data = await api('getClients');
  showSpinner(false);
  if(Array.isArray(data)) {
    state.clients = data.map(c => ({ ...c, props: [] }));
    renderClientsGrid();
  }
}

async function loadProperties(clientId) {
  const data = await api('getProperties', { clientId });
  if(Array.isArray(data)) {
    const c = state.clients.find(x=>x.id===clientId);
    if(c) {
      c.props = data.map(p => ({
        id: p.id, url: p.url, price: p.price, addr: p.address,
        rooms: p.rooms, m2: p.sqm, floor: p.floor_info,
        liked: p.liked === true || p.liked === 'TRUE',
        comment: p.comment || ''
      }));
    }
  }
}

async function loadVisits() {
  const data = await api('getVisits');
  if(Array.isArray(data)) {
    visits = data.map(v => ({
      id: v.id, date: v.date, time: v.time, addr: v.address,
      client: v.client_name, url: v.url,
      lat: parseFloat(v.lat) || -34.59,
      lng: parseFloat(v.lng) || -58.43
    }));
  }
}

/* ---- CALENDAR ---- */
function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

function renderCal() {
  const Lx = L();
  document.getElementById('cal-month-lbl').textContent = `${Lx.MONTHS[calMonth]} ${calYear}`;
  const datesWithVisits = new Set(visits.map(v=>v.date));
  const first = new Date(calYear, calMonth, 1);
  const startDow = (first.getDay()+6)%7;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let html = Lx.DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day other">${prevDays-startDow+1+i}</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = ['cal-day', ds===todayStr?'today':'', ds===selectedDate?'selected':'', datesWithVisits.has(ds)?'has-visit':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  const rem = (startDow+daysInMonth)%7; if(rem) for(let i=1;i<=7-rem;i++) html+=`<div class="cal-day other">${i}</div>`;
  document.getElementById('cal-grid').innerHTML = html;
  renderDayVisits();
}

function renderMap(dayV, hlId) {
  const svg = document.getElementById('map-svg');
  const rc = document.getElementById('route-chips');
  if(!dayV.length){
    svg.innerHTML=`<rect width="400" height="290" fill="#f0ede6" rx="8"/><text x="200" y="145" text-anchor="middle" font-size="13" fill="#9799a6" font-family="sans-serif">${t('noVisits')}</text>`;
    rc.innerHTML=''; return;
  }
  const lats=dayV.map(v=>v.lat), lngs=dayV.map(v=>v.lng);
  const pad=0.012;
  const minLat=Math.min(...lats)-pad, maxLat=Math.max(...lats)+pad;
  const minLng=Math.min(...lngs)-pad, maxLng=Math.max(...lngs)+pad;
  const ranLat=maxLat-minLat||0.03, ranLng=maxLng-minLng||0.03;
  const W=400, H=290, MX=28, MY=22;
  const toX=lng=>MX+((lng-minLng)/ranLng)*(W-MX*2);
  const toY=lat=>MY+((maxLat-lat)/ranLat)*(H-MY*2);

  let s=`<rect width="${W}" height="${H}" fill="#edecea" rx="8"/>`;
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=MY+(H-MY*2)*i/4;
    s+=`<line x1="${MX}" y1="${y}" x2="${W-MX}" y2="${y}" stroke="#dddbd6" stroke-width="0.5"/>`;
  }

  // Route lines
  for(let i=0;i<dayV.length-1;i++){
    const a=dayV[i],b=dayV[i+1];
    const x1=toX(a.lng),y1=toY(a.lat),x2=toX(b.lng),y2=toY(b.lat);
    const mx=(x1+x2)/2,my=(y1+y2)/2-20;
    s+=`<path d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" stroke="#1B3A5C" stroke-width="2" fill="none" stroke-dasharray="5 3" opacity="0.5"/>`;
    const ang=Math.atan2(y2-y1,x2-x1);
    const ax=((x1+x2)/2+Math.cos(ang)*6), ay=((y1+y2)/2+Math.sin(ang)*6);
    s+=`<polygon points="0,-4 3.5,3 -3.5,3" fill="#1B3A5C" opacity="0.6" transform="translate(${ax},${ay}) rotate(${ang*180/Math.PI+90})"/>`;
  }

  // Pins
  dayV.forEach((v,i)=>{
    const x=toX(v.lng), y=toY(v.lat);
    const isHL = v.id===hlId;
    const r = isHL?15:11;
    s+=`<circle cx="${x}" cy="${y}" r="${r+3}" fill="rgba(27,58,92,0.12)"/>`;
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${isHL?'#1B3A5C':'#fff'}" stroke="#1B3A5C" stroke-width="${isHL?0:1.5}"/>`;
    s+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="${isHL?11:10}" font-weight="600" fill="${isHL?'#fff':'#1B3A5C'}" font-family="sans-serif">${i+1}</text>`;
    const parts=v.addr.split(',');
    const lx=x+(x>W/2?-14:14), anchor=x>W/2?'end':'start';
    s+=`<rect x="${x>W/2?lx-parts[0].length*4.5:lx-4}" y="${y-26}" width="${parts[0].length*5.2}" height="16" rx="4" fill="rgba(255,255,255,0.88)"/>`;
    s+=`<text x="${lx}" y="${y-15}" text-anchor="${anchor}" font-size="10" font-weight="500" fill="#16181F" font-family="sans-serif">${parts[0]}</text>`;
  });

  svg.innerHTML=s;

  const Lx=L();
  const dist=dayV.length>1?(dayV.length*1.8).toFixed(1):'';
  rc.innerHTML=`
    <span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${Lx.visitCount(dayV.length)}</span>
    ${dist?`<span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/></svg>${Lx.estDist(dist)}</span>`:''}
    <span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dayV[0].time} – ${dayV[dayV.length-1].time}</span>
  `;
}

/* ---- CLIENT CALENDAR ---- */
let calYearC = new Date().getFullYear();
let calMonthC = new Date().getMonth();
let selectedDateC = todayStr;
let highlightedVisitIdC = null;

function prevMonthC() { calMonthC--; if(calMonthC<0){calMonthC=11;calYearC--;} renderCalC(); }
function nextMonthC() { calMonthC++; if(calMonthC>11){calMonthC=0;calYearC++;} renderCalC(); }

function renderCalC(clientName) {
  const Lx = L();
  const lbl = document.getElementById('cal-month-lbl-c');
  if(lbl) lbl.textContent = `${Lx.MONTHS[calMonthC]} ${calYearC}`;
  const clientVisits = clientName ? visits.filter(v=>v.client===clientName) : visits;
  const datesWithVisits = new Set(clientVisits.map(v=>v.date));
  const first = new Date(calYearC, calMonthC, 1);
  const startDow = (first.getDay()+6)%7;
  const daysInMonth = new Date(calYearC, calMonthC+1, 0).getDate();
  const prevDays = new Date(calYearC, calMonthC, 0).getDate();
  let html = Lx.DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day other">${prevDays-startDow+1+i}</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYearC}-${String(calMonthC+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day',ds===todayStr?'today':'',ds===selectedDateC?'selected':'',datesWithVisits.has(ds)?'has-visit':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDateC('${ds}')">${d}</div>`;
  }
  const rem=(startDow+daysInMonth)%7; if(rem) for(let i=1;i<=7-rem;i++) html+=`<div class="cal-day other">${i}</div>`;
  const g = document.getElementById('cal-grid-c');
  if(g) g.innerHTML = html;
  renderDayVisitsC(clientName);
}

function selectDateC(d) {
  selectedDateC = d;
  const [y,m] = d.split('-').map(Number);
  calYearC=y; calMonthC=m-1;
  highlightedVisitIdC = null;
  const c = state.currentClient ? state.clients.find(x=>x.id===state.currentClient) : state.clients[0];
  renderCalC(c ? c.name : null);
}

function renderDayVisitsC(clientName) {
  const clientVisits = clientName ? visits.filter(v=>v.client===clientName) : visits;
  const dayV = clientVisits.filter(v=>v.date===selectedDateC).sort((a,b)=>a.time.localeCompare(b.time));
  const el = document.getElementById('day-visits-c');
  if(!el) return;
  if(!dayV.length){
    el.innerHTML=`<div class="empty-day"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${t('noVisits')}</div>`;
    renderMapC([]); return;
  }
  el.innerHTML = `<div class="visit-list">${dayV.map((v,i)=>`
    <div class="visit-item${v.id===highlightedVisitIdC?' active':''}" onclick="highlightVisitC(${v.id},'${clientName||''}')" id="vic-${v.id}">
      <div class="visit-num">${i+1}</div>
      <div class="visit-info">
        <div class="visit-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${v.time}</div>
        <div class="visit-addr">${v.addr}</div>
        ${v.url?`<a class="visit-link" href="${v.url}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Ver propiedad</a>`:''}
      </div>
    </div>`).join('')}</div>`;
  renderMapC(dayV);
}

function highlightVisitC(id, clientName) {
  highlightedVisitIdC = id;
  document.querySelectorAll('#day-visits-c .visit-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('vic-'+id);
  if(el) el.classList.add('active');
  const clientVisits = clientName ? visits.filter(v=>v.client===clientName) : visits;
  const dayV = clientVisits.filter(v=>v.date===selectedDateC).sort((a,b)=>a.time.localeCompare(b.time));
  renderMapC(dayV, id);
}

function renderMapC(dayV, hlId) {
  const svg = document.getElementById('map-svg-c');
  const rc = document.getElementById('route-chips-c');
  if(!svg) return;
  if(!dayV.length){
    svg.innerHTML=`<rect width="400" height="290" fill="#edecea" rx="8"/><text x="200" y="145" text-anchor="middle" font-size="13" fill="#9799a6" font-family="sans-serif">${t('noVisits')}</text>`;
    if(rc) rc.innerHTML=''; return;
  }
  const lats=dayV.map(v=>v.lat), lngs=dayV.map(v=>v.lng);
  const pad=0.012;
  const minLat=Math.min(...lats)-pad, maxLat=Math.max(...lats)+pad;
  const minLng=Math.min(...lngs)-pad, maxLng=Math.max(...lngs)+pad;
  const ranLat=maxLat-minLat||0.03, ranLng=maxLng-minLng||0.03;
  const W=400,H=290,MX=28,MY=22;
  const toX=lng=>MX+((lng-minLng)/ranLng)*(W-MX*2);
  const toY=lat=>MY+((maxLat-lat)/ranLat)*(H-MY*2);
  let s=`<rect width="${W}" height="${H}" fill="#edecea" rx="8"/>`;
  for(let i=0;i<=4;i++){const y=MY+(H-MY*2)*i/4;s+=`<line x1="${MX}" y1="${y}" x2="${W-MX}" y2="${y}" stroke="#dddbd6" stroke-width="0.5"/>`;}
  for(let i=0;i<dayV.length-1;i++){
    const a=dayV[i],b=dayV[i+1];
    const x1=toX(a.lng),y1=toY(a.lat),x2=toX(b.lng),y2=toY(b.lat);
    const mx=(x1+x2)/2,my=(y1+y2)/2-20;
    s+=`<path d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" stroke="#1B3A5C" stroke-width="2" fill="none" stroke-dasharray="5 3" opacity="0.5"/>`;
    const ang=Math.atan2(y2-y1,x2-x1);
    const ax=((x1+x2)/2+Math.cos(ang)*6),ay=((y1+y2)/2+Math.sin(ang)*6);
    s+=`<polygon points="0,-4 3.5,3 -3.5,3" fill="#1B3A5C" opacity="0.6" transform="translate(${ax},${ay}) rotate(${ang*180/Math.PI+90})"/>`;
  }
  dayV.forEach((v,i)=>{
    const x=toX(v.lng),y=toY(v.lat),isHL=v.id===hlId,r=isHL?15:11;
    s+=`<circle cx="${x}" cy="${y}" r="${r+3}" fill="rgba(27,58,92,0.12)"/>`;
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${isHL?'#1B3A5C':'#fff'}" stroke="#1B3A5C" stroke-width="${isHL?0:1.5}"/>`;
    s+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="${isHL?11:10}" font-weight="600" fill="${isHL?'#fff':'#1B3A5C'}" font-family="sans-serif">${i+1}</text>`;
    const parts=v.addr.split(','),lx=x+(x>W/2?-14:14),anchor=x>W/2?'end':'start';
    s+=`<rect x="${x>W/2?lx-parts[0].length*4.5:lx-4}" y="${y-26}" width="${parts[0].length*5.2}" height="16" rx="4" fill="rgba(255,255,255,0.88)"/>`;
    s+=`<text x="${lx}" y="${y-15}" text-anchor="${anchor}" font-size="10" font-weight="500" fill="#16181F" font-family="sans-serif">${parts[0]}</text>`;
  });
  svg.innerHTML=s;
  const Lx=L(),dist=dayV.length>1?(dayV.length*1.8).toFixed(1):'';
  if(rc) rc.innerHTML=`
    <span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${Lx.visitCount(dayV.length)}</span>
    ${dist?`<span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${Lx.estDist(dist)}</span>`:''}
    <span class="route-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dayV[0].time} – ${dayV[dayV.length-1].time}</span>
  `;
}

// Init
setLang('es');

// Check if opened as client view (?client=ID)
const urlParams = new URLSearchParams(window.location.search);
const clientParam = urlParams.get('client');

async function init() {
  await loadClients();
  await loadVisits();
  renderCal();

  if(clientParam) {
    // Client view: hide agent tabs, show only client view
    document.getElementById('tab-agent').style.display='none';
    document.getElementById('tab-visits').style.display='none';
    switchTab('client');
    const c = state.clients.find(x=>x.id===clientParam);
    if(c) {
      state.currentClient = clientParam;
      await loadProperties(clientParam);
      syncClientView(c);
    }
  }
}

init();
</script>
